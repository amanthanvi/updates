name: CI

on:
  push:
  pull_request:

jobs:
  unix-lint-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: LF guard
        shell: pwsh
        run: ./scripts/ci-guard-lf.ps1
      - name: Syntax check
        run: bash -n updates
      - name: Install ShellCheck (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Install shfmt (Linux)
        if: runner.os == 'Linux'
        run: |
          curl -fsSL https://github.com/mvdan/sh/releases/download/v3.12.0/shfmt_v3.12.0_linux_amd64 -o shfmt
          echo "d9fbb2a9c33d13f47e7618cf362a914d029d02a6df124064fff04fd688a745ea  shfmt" | sha256sum -c -
          chmod +x shfmt
          sudo mv shfmt /usr/local/bin/shfmt
      - name: Install ShellCheck + shfmt (macOS)
        if: runner.os == 'macOS'
        run: brew install shellcheck shfmt
      - name: Lint
        run: ./scripts/lint.sh
      - name: Tests
        run: ./scripts/test.sh

  windows-powershell-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: LF guard
        shell: pwsh
        run: ./scripts/ci-guard-lf.ps1
      - name: Bash syntax smoke
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if (-not (Get-Command bash -ErrorAction SilentlyContinue)) {
            throw 'bash is required for the Windows smoke job'
          }
          bash -lc "set -euo pipefail; bash -n updates; bash -n scripts/*.sh; bash -n tests/*.sh"
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
      - name: Windows native tests
        shell: pwsh
        run: ./tests/test_windows_native.ps1
